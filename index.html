<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Riesgo Vial Perú</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root{--bg:#0f172a;--panel:rgba(15,23,42,.95);--card:rgba(30,41,59,.95);--text:#e5e7eb;--muted:#94a3b8;--border:rgba(148,163,184,.25);--green:#22c55e;--yellow:#facc15;--red:#ef4444;--blue:#38bdf8}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}.app{height:100vh;display:grid;grid-template-columns:365px 1fr}aside{z-index:10;padding:18px;overflow-y:auto;background:radial-gradient(circle at top left,rgba(56,189,248,.18),transparent 38%),linear-gradient(180deg,rgba(15,23,42,.99),rgba(15,23,42,.95));border-right:1px solid var(--border)}h1{font-size:20px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-top:14px}.card h2{font-size:13px;text-transform:uppercase;letter-spacing:.04em;margin:0 0 12px}label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}input,select,button{width:100%;padding:10px;border-radius:12px;border:1px solid var(--border);background:rgba(15,23,42,.9);color:var(--text);outline:none}button{cursor:pointer;background:linear-gradient(135deg,#0284c7,#2563eb);border:0;font-weight:700}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}#map{width:100%;height:100vh;background:#020617}.pill{position:absolute;z-index:500;top:16px;padding:10px 14px;border-radius:999px;background:var(--panel);border:1px solid var(--border);box-shadow:0 14px 35px rgba(0,0,0,.35);font-size:13px}#status{left:385px}#timeStatus{right:18px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{padding:10px;text-align:center;border-radius:14px;background:rgba(15,23,42,.72);border:1px solid var(--border)}.stat strong{display:block;font-size:18px}.stat span{font-size:11px;color:var(--muted)}.risk{display:inline-block;padding:5px 9px;border-radius:999px;font-weight:800;font-size:12px;color:#020617}.BAJO{background:var(--green)}.MEDIO{background:var(--yellow)}.ALTO{background:var(--red);color:white}.detail-row{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid rgba(148,163,184,.14);font-size:13px}.detail-row span:first-child{color:var(--muted)}.legend-row{display:flex;justify-content:space-between;align-items:center;margin:8px 0;font-size:13px}.line{width:60px;height:7px;border-radius:999px}.error{display:none;margin-top:12px;padding:10px;border-radius:12px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fecaca;font-size:12px}@media(max-width:900px){.app{grid-template-columns:1fr}aside{position:absolute;width:min(94vw,365px);height:92vh;left:12px;top:12px;border-radius:20px}#status{left:20px;top:auto;bottom:18px}#timeStatus{right:18px;top:auto;bottom:18px}}
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>Riesgo Vial Perú</h1>
      <div class="sub">Mapa interactivo con riesgo histórico y datos en tiempo real</div>
      <div id="errorBox" class="error"></div>
      <div class="card"><h2>Filtros</h2><label>Buscar carretera o zona</label><input id="searchInput" placeholder="Ejemplo: PE-34, Lima, Panamericana" oninput="aplicarFiltros()"/><div class="row"><div><label>Riesgo</label><select id="riskFilter" onchange="aplicarFiltros()"><option value="TODOS">Todos</option><option value="BAJO">Bajo</option><option value="MEDIO">Medio</option><option value="ALTO">Alto</option></select></div><div><label>Departamento</label><select id="depFilter" onchange="aplicarFiltros()"><option value="TODOS">Todos</option></select></div></div><label style="margin-top:10px">Score mínimo: <strong id="scoreValue">0.00</strong></label><input id="scoreFilter" type="range" min="0" max="1" step="0.01" value="0" oninput="aplicarFiltros()"/><div class="row"><button onclick="limpiarFiltros()">Limpiar</button><button onclick="zoomFiltrado()">Ver filtrados</button></div></div>
      <div class="card"><h2>Resumen</h2><div class="stats"><div class="stat"><strong id="totalRoads">0</strong><span>Carreteras</span></div><div class="stat"><strong id="totalMedium">0</strong><span>Medio</span></div><div class="stat"><strong id="totalHigh">0</strong><span>Alto</span></div></div></div>
      <div class="card"><h2>Leyenda</h2><div class="legend-row"><span>Bajo</span><span class="line" style="background:#22c55e"></span></div><div class="legend-row"><span>Medio</span><span class="line" style="background:#facc15"></span></div><div class="legend-row"><span>Alto</span><span class="line" style="background:#ef4444"></span></div></div>
      <div class="card"><h2>Detalle</h2><div id="detailBox" style="font-size:13px;color:var(--muted)">Haz clic en una carretera.</div></div>
    </aside>
    <main><div class="pill" id="status">Cargando mapa...</div><div class="pill" id="timeStatus">Tiempo real: esperando...</div><div id="map"></div></main>
  </div>
<script>
const DATA_URLS={carreteras:"data/carreteras_peru.geojson",riesgoBase:"data/riesgo_base_carreteras.json",backendTiempoReal:"https://riesgo-vial-backend.vercel.app/api/tiempo-real",camarasLima:"data/camaras_lima.json"};
const AUTO_REFRESH_MS=60000;let map,roadLayer,roadGeoJSON,riskData=[],liveData=[],mergedFeatures=[];const colores={BAJO:"#22c55e",MEDIO:"#facc15",ALTO:"#ef4444",SIN_DATO:"#94a3b8"};initMap();cargarInicial();
function initMap(){map=L.map("map",{preferCanvas:true}).setView([-9.19,-75.0152],6);L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:20,attribution:"© OpenStreetMap © CARTO"}).addTo(map)}
async function fetchJSON(url,required=false){try{const res=await fetch(url,{cache:"no-store"});if(!res.ok){if(required)throw new Error("No se encontró "+url);return null}return await res.json()}catch(error){if(required)throw error;console.warn("Opcional no cargado:",url,error.message);return null}}
async function cargarInicial(){try{setStatus("Cargando carreteras y riesgo base...");roadGeoJSON=await fetchJSON(DATA_URLS.carreteras,true);riskData=await fetchJSON(DATA_URLS.riesgoBase,true);await actualizarTiempoReal();prepararDatos();dibujarCarreteras();llenarDepartamentos();aplicarFiltros();setStatus("Mapa cargado correctamente");setInterval(async()=>{await actualizarTiempoReal();prepararDatos();dibujarCarreteras(false);aplicarFiltros()},AUTO_REFRESH_MS)}catch(error){mostrarError("No se pudo cargar el mapa. Revisa data/carreteras_peru.geojson y data/riesgo_base_carreteras.json.");setStatus("Error al cargar datos");console.error(error)}}
async function actualizarTiempoReal(){const response=await fetchJSON(DATA_URLS.backendTiempoReal,false);if(response){liveData=Array.isArray(response)?response:(response.data||[]);document.getElementById("timeStatus").textContent="Tiempo real: "+new Date().toLocaleTimeString("es-PE")}}
function normalizar(v){return String(v||"").trim().toUpperCase().replace(/\s+/g,"")}function texto(v){return String(v||"").trim().toUpperCase()}
function prepararDatos(){const riesgoMap=new Map();riskData.forEach(r=>{const cod=normalizar(r.COD_CARRETERA||r.cod_carretera||r.codigo);if(cod)riesgoMap.set(cod,r)});const liveMap=new Map();liveData.forEach(r=>{const cod=normalizar(r.COD_CARRETERA||r.cod_carretera||r.codigo);if(cod)liveMap.set(cod,r)});mergedFeatures=(roadGeoJSON.features||[]).map(f=>{const p=f.properties||{};const cod=normalizar(p.COD_CARRETERA||p.cod_carretera||p.RUTA||p.ruta||p.CODIGO||p.codigo);const base=riesgoMap.get(cod)||{};const live=liveMap.get(cod)||{};const score=Number(live.score_actual_html??base.score_rolling_3m_prom??base.score_rolling_6m_prom??0);const riesgo=inferirRiesgo(live,base,score);f.properties={...p,...base,...live,COD_CARRETERA:cod||"SIN_CODIGO",DEPARTAMENTO:texto(p.DEPARTAMENTO||p.departamento||base.DEPARTAMENTO||base.departamento||p.DPTO||""),NIVEL_RIESGO:riesgo,SCORE_MAPA:score};return f})}
function inferirRiesgo(live,base,score){const directo=live.NIVEL_RIESGO_ACTUAL||live.NIVEL_RIESGO||base.ultimo_riesgo_conocido||base.NIVEL_RIESGO;if(directo){const r=texto(directo);if(["BAJO","MEDIO","ALTO"].includes(r))return r}if(score>=.65)return"ALTO";if(score>=.25)return"MEDIO";return"BAJO"}
function estilo(f){const r=f.properties.NIVEL_RIESGO||"SIN_DATO";let weight=4;if(r==="MEDIO")weight=5;if(r==="ALTO")weight=7;return{color:colores[r]||colores.SIN_DATO,weight,opacity:.9,lineCap:"round",lineJoin:"round"}}
function dibujarCarreteras(ajustarZoom=true){if(roadLayer)map.removeLayer(roadLayer);roadLayer=L.geoJSON(mergedFeatures,{style:estilo,onEachFeature:(f,layer)=>{layer.on("click",()=>mostrarDetalle(f));layer.on("mouseover",()=>layer.setStyle({weight:estilo(f).weight+2,opacity:1}));layer.on("mouseout",()=>layer.setStyle(estilo(f)));layer.bindPopup(popup(f))}}).addTo(map);if(ajustarZoom&&roadLayer.getBounds().isValid())map.fitBounds(roadLayer.getBounds(),{padding:[30,30]})}
function popup(f){const p=f.properties,r=p.NIVEL_RIESGO||"SIN_DATO";return `<strong>${p.COD_CARRETERA}</strong><br><span class="risk ${r}">${r}</span><br><br>Departamento: ${p.DEPARTAMENTO||"-"}<br>Score: ${Number(p.SCORE_MAPA||0).toFixed(3)}<br>Velocidad actual: ${p.currentSpeed??"-"} km/h<br>Velocidad libre: ${p.freeFlowSpeed??"-"} km/h<br>Temperatura: ${p.om_temperatura_c??"-"} °C<br>Lluvia: ${p.om_lluvia_mm??"-"} mm`}
function mostrarDetalle(f){const p=f.properties,r=p.NIVEL_RIESGO||"SIN_DATO";document.getElementById("detailBox").innerHTML=`<span class="risk ${r}">${r}</span><div class="detail-row"><span>Código</span><strong>${p.COD_CARRETERA}</strong></div><div class="detail-row"><span>Departamento</span><strong>${p.DEPARTAMENTO||"-"}</strong></div><div class="detail-row"><span>Score</span><strong>${Number(p.SCORE_MAPA||0).toFixed(4)}</strong></div><div class="detail-row"><span>Velocidad actual</span><strong>${p.currentSpeed??"-"} km/h</strong></div><div class="detail-row"><span>Velocidad libre</span><strong>${p.freeFlowSpeed??"-"} km/h</strong></div><div class="detail-row"><span>Congestión</span><strong>${formatPct(p.factor_congestion_html)}</strong></div><div class="detail-row"><span>Temperatura</span><strong>${p.om_temperatura_c??"-"} °C</strong></div><div class="detail-row"><span>Lluvia</span><strong>${p.om_lluvia_mm??"-"} mm</strong></div><div class="detail-row"><span>Actualizado</span><strong>${p.actualizado_en?new Date(p.actualizado_en).toLocaleTimeString("es-PE"):"-"}</strong></div>`}
function aplicarFiltros(){if(!roadLayer)return;const riesgo=document.getElementById("riskFilter").value,dep=document.getElementById("depFilter").value,search=texto(document.getElementById("searchInput").value),minScore=Number(document.getElementById("scoreFilter").value);document.getElementById("scoreValue").textContent=minScore.toFixed(2);let total=0,medio=0,alto=0;roadLayer.eachLayer(layer=>{const p=layer.feature.properties,r=p.NIVEL_RIESGO,score=Number(p.SCORE_MAPA||0),contenido=texto([p.COD_CARRETERA,p.DEPARTAMENTO,p.NOMBRE,p.RUTA].join(" "));const visible=(riesgo==="TODOS"||r===riesgo)&&(dep==="TODOS"||p.DEPARTAMENTO===dep)&&(!search||contenido.includes(search))&&score>=minScore;if(visible){layer.setStyle({...estilo(layer.feature),opacity:.92});total++;if(r==="MEDIO")medio++;if(r==="ALTO")alto++}else layer.setStyle({...estilo(layer.feature),opacity:.08,weight:2})});document.getElementById("totalRoads").textContent=total;document.getElementById("totalMedium").textContent=medio;document.getElementById("totalHigh").textContent=alto}
function llenarDepartamentos(){const sel=document.getElementById("depFilter"),deps=new Set();mergedFeatures.forEach(f=>{const d=f.properties.DEPARTAMENTO;if(d)deps.add(d)});sel.innerHTML='<option value="TODOS">Todos</option>';[...deps].sort().forEach(d=>{const op=document.createElement("option");op.value=d;op.textContent=d;sel.appendChild(op)})}
function limpiarFiltros(){document.getElementById("riskFilter").value="TODOS";document.getElementById("depFilter").value="TODOS";document.getElementById("searchInput").value="";document.getElementById("scoreFilter").value=0;aplicarFiltros()}
function zoomFiltrado(){const grupo=L.featureGroup();roadLayer.eachLayer(layer=>{if(layer.options.opacity>.2)grupo.addLayer(layer)});if(grupo.getBounds().isValid())map.fitBounds(grupo.getBounds(),{padding:[40,40]})}
function setStatus(t){document.getElementById("status").textContent=t}function mostrarError(t){const box=document.getElementById("errorBox");box.style.display="block";box.textContent=t}function formatPct(v){const n=Number(v);if(!Number.isFinite(n))return"-";return(n*100).toFixed(1)+"%"}
</script>
</body>
</html>
