<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Riesgo Vial Perú - Tiempo real</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#020617;--panel:#0f172aeF;--card:#1e293beF;--txt:#e5e7eb;--mut:#94a3b8;--b:#334155;--g:#22c55e;--y:#facc15;--r:#ef4444;--o:#fb923c;--c:#38bdf8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,Segoe UI,sans-serif}.app{display:grid;grid-template-columns:370px 1fr;height:100vh}aside{padding:18px;overflow:auto;background:linear-gradient(180deg,#0f172a,#020617);border-right:1px solid var(--b);z-index:9}h1{margin:0;font-size:21px}.sub{color:var(--mut);font-size:12px;margin-top:4px}.card{margin-top:14px;padding:14px;border:1px solid var(--b);background:var(--card);border-radius:18px}.card h2{font-size:13px;text-transform:uppercase;margin:0 0 10px;letter-spacing:.05em}label{display:block;color:var(--mut);font-size:12px;margin:9px 0 6px}input,select,button{width:100%;padding:10px;border-radius:12px;border:1px solid var(--b);background:#0f172a;color:var(--txt)}button{border:0;background:linear-gradient(135deg,#0284c7,#2563eb);font-weight:700;cursor:pointer}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#0f172a;border:1px solid var(--b);border-radius:14px;padding:10px;text-align:center}.stat b{display:block;font-size:18px}.stat span{color:var(--mut);font-size:11px}.risk,.tag{display:inline-block;padding:5px 9px;border-radius:999px;font-weight:900;font-size:12px;color:#020617}.BAJO,.OK{background:var(--g)}.MEDIO,.WARN{background:var(--y)}.ALTO,.DANGER{background:var(--r);color:white}.INFO{background:var(--c)}.ORANGE{background:var(--o);color:#111827}.quick{margin-top:10px;padding:10px;border-radius:16px;background:#0f172a;border:1px solid #334155}.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.quick-item{padding:9px;border-radius:12px;background:#111c31;border:1px solid #25344d}.quick-item span{display:block;color:var(--mut);font-size:11px;margin-bottom:4px}.quick-item b{font-size:13px}.section-title{margin:13px 0 6px;padding:7px 10px;border-radius:12px;background:#0f172a;border:1px solid var(--b);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:#e0f2fe}.detail{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid #33415599;font-size:13px}.detail span:first-child{color:var(--mut)}#map{height:100vh}.pill{position:absolute;z-index:500;top:16px;padding:10px 14px;border-radius:999px;background:var(--panel);border:1px solid var(--b);font-size:13px;box-shadow:0 12px 30px #0008}#status{left:390px}#time{right:18px}.err{display:none;color:#fecaca;background:#7f1d1d55;border:1px solid #ef4444;border-radius:12px;padding:10px;margin-top:12px;font-size:12px}.legend{display:flex;align-items:center;justify-content:space-between;margin:7px 0}.line{width:60px;height:7px;border-radius:99px}.leaflet-bottom.leaflet-left{bottom:20px;left:16px}.leaflet-control-zoom a{background:#0f172a!important;color:#e5e7eb!important;border-color:#334155!important}@media(max-width:900px){.app{grid-template-columns:1fr}aside{position:absolute;left:12px;top:12px;width:min(94vw,370px);height:90vh;border-radius:20px}#status{left:20px;top:auto;bottom:18px}#time{right:18px;top:auto;bottom:18px}.leaflet-bottom.leaflet-left{bottom:72px;left:16px}}
</style>
</head>
<body>
<div class="app"><aside>
<h1>Riesgo Vial Perú</h1><div class="sub">Modelo MLlib + TomTom + OpenWeather en tiempo real</div><div id="err" class="err"></div>
<div class="card"><h2>Filtros</h2><label>Buscar</label><input id="q" placeholder="PE-1S, Lima, Panamericana" oninput="filtrar()"><div class="row"><div><label>Riesgo</label><select id="fr" onchange="filtrar()"><option>TODOS</option><option>BAJO</option><option>MEDIO</option><option>ALTO</option></select></div><div><label>Departamento</label><select id="fd" onchange="filtrar()"><option>TODOS</option></select></div></div><label>Score mínimo: <b id="sv">0.00</b></label><input id="fs" type="range" min="0" max="1" step="0.01" value="0" oninput="filtrar()"><div class="row"><button onclick="limpiar()">Limpiar</button><button onclick="zoomFiltrado()">Ver filtrados</button></div></div>
<div class="card"><h2>Resumen</h2><div class="stats"><div class="stat"><b id="tot">0</b><span>Carreteras</span></div><div class="stat"><b id="med">0</b><span>Medio</span></div><div class="stat"><b id="alt">0</b><span>Alto</span></div></div></div>
<div class="card"><h2>Modelo</h2><div id="modelBox" style="font-size:13px;color:var(--mut)">Cargando modelo...</div></div>
<div class="card"><h2>Leyenda</h2><div class="legend">Bajo<span class="line" style="background:#22c55e"></span></div><div class="legend">Medio<span class="line" style="background:#facc15"></span></div><div class="legend">Alto<span class="line" style="background:#ef4444"></span></div></div>
<div class="card"><h2>Detalle</h2><div id="det" style="font-size:13px;color:var(--mut)">Haz clic en una carretera.</div></div>
</aside><main><div id="status" class="pill">Cargando...</div><div id="time" class="pill">Tiempo real: esperando...</div><div id="map"></div></main></div>
<script>
const URLS={carreteras:'data/carreteras_peru.geojson',riesgo:'data/riesgo_base_carreteras.json',modelo:'data/modelo_export.json',backend:'https://riesgo-vial-backend.vercel.app/api/tiempo-real'};
const el=id=>document.getElementById(id);
let map=L.map('map',{preferCanvas:true,zoomControl:false}).setView([-9.19,-75.0152],6),layer,geo,base=[],live=[],features=[];
L.control.zoom({position:'bottomleft'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:20,attribution:'© OpenStreetMap © CARTO'}).addTo(map);
const color={BAJO:'#22c55e',MEDIO:'#facc15',ALTO:'#ef4444',SIN_DATO:'#94a3b8'};
const norm=v=>String(v||'').trim().toUpperCase().replace(/\s+/g,'');
const txt=v=>String(v||'').trim().toUpperCase();
async function getJSON(u,req=false){try{let r=await fetch(u,{cache:'no-store'});if(!r.ok){if(req)throw Error(u);return null}return await r.json()}catch(e){if(req)throw e;console.warn(e);return null}}
async function init(){try{setStatus('Cargando datos base...');geo=await getJSON(URLS.carreteras,true);base=await getJSON(URLS.riesgo,true);await cargarModelo();await tiempoReal();mezclar();dibujar(true);llenarDptos();filtrar();setStatus('Mapa cargado correctamente')}catch(e){error('No se pudo cargar el mapa. Revisa data/carreteras_peru.geojson y data/riesgo_base_carreteras.json');setStatus('Error al cargar');console.error(e)}setInterval(async()=>{await tiempoReal();mezclar();dibujar(false);filtrar()},60000)}
async function cargarModelo(){let m=await getJSON(URLS.modelo,false);if(!m)return;let mm=m.mejor_metrica||{};el('modelBox').innerHTML=`<b style="color:white">${m.mejor_modelo||mm.modelo_balanceo||'-'}</b><div class="detail"><span>Accuracy</span><b>${fmt(mm.accuracy)}</b></div><div class="detail"><span>F1</span><b>${fmt(mm.f1)}</b></div><div class="detail"><span>Precision</span><b>${fmt(mm.precision)}</b></div><div class="detail"><span>Recall</span><b>${fmt(mm.recall)}</b></div>`}
async function tiempoReal(){let r=await getJSON(URLS.backend,false);if(r){live=Array.isArray(r)?r:(r.data||[]);let ok=live.filter(x=>x.clima_disponible).length;el('time').textContent=`Tiempo real: ${live.length} puntos, clima ${ok}/${live.length}`}}
function scoreBase(b){return Number(b.score_rolling_3m_prom??b.score_rolling_6m_prom??0)}
function scoreConTiempoReal(b,l,match){let baseScore=scoreBase(b);if(!l)return baseScore;let congestion=Number(l.factor_congestion_html??0);let clima=Number(l.factor_clima_html??0);let ajuste=0.18*congestion+0.10*clima;if(match==='exacto'&&Number.isFinite(Number(l.score_actual_html))){return Math.max(baseScore,Number(l.score_actual_html),Math.min(1,baseScore+ajuste))}return Math.min(1,baseScore+ajuste)}
function mezclar(){let bm=new Map(),lm=new Map();base.forEach(x=>{let c=norm(x.COD_CARRETERA||x.codigo);if(c)bm.set(c,x)});live.forEach(x=>{let c=norm(x.COD_CARRETERA||x.codigo);if(c)lm.set(c,x)});features=(geo.features||[]).map(f=>{let p=f.properties||{},c=norm(p.COD_CARRETERA||p.RUTA||p.CODIGO||p.codigo),b=bm.get(c)||{},l=lm.get(c)||null,match='exacto';if(!l){l=liveCercano(f);match=l?'cercano':'sin_dato'}let s=scoreConTiempoReal(b,l,match);let r=nivel(l||{},b,s);f.properties={...p,...b,...(l||{}),COD_CARRETERA:c||'SIN_CODIGO',DEPARTAMENTO:txt(p.DEPARTAMENTO||p.departamento||b.DEPARTAMENTO||b.departamento||p.DPTO||''),NIVEL_RIESGO:r,SCORE_MAPA:s,SCORE_BASE_MODELO:scoreBase(b),TIEMPO_REAL_MATCH:match};return f})}
function liveCercano(f){if(!live.length)return null;let c=centroFeature(f);if(!c)return null;let mejor=null,dist=Infinity;live.forEach(x=>{if(Number.isFinite(Number(x.lat))&&Number.isFinite(Number(x.lon))){let d=distKm(c.lat,c.lon,Number(x.lat),Number(x.lon));if(d<dist){dist=d;mejor=x}}});return mejor?{...mejor,distancia_punto_km:Number(dist.toFixed(1))}:null}
function centroFeature(f){let pts=[];function add(a){if(Array.isArray(a)&&typeof a[0]==='number'&&typeof a[1]==='number')pts.push(a);else if(Array.isArray(a))a.forEach(add)}add(f.geometry?.coordinates);if(!pts.length)return null;let lon=0,lat=0;pts.forEach(p=>{lon+=p[0];lat+=p[1]});return{lon:lon/pts.length,lat:lat/pts.length}}
function distKm(a,b,c,d){let R=6371,toRad=x=>x*Math.PI/180,dLat=toRad(c-a),dLon=toRad(d-b),s=Math.sin(dLat/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(s))}
function nivel(l,b,s){let d=l.NIVEL_RIESGO_ACTUAL||l.NIVEL_RIESGO||b.ultimo_riesgo_conocido||b.NIVEL_RIESGO;if(Number(s)>=0.65)return'ALTO';if(Number(s)>=0.25)return'MEDIO';if(d){d=txt(d);if(['BAJO','MEDIO','ALTO'].includes(d))return d}return'BAJO'}
function estadoTrafico(p){let c=Number(p.factor_congestion_html??0),v=velDiff(p);if(c>=.60)return{t:'Crítico',cls:'DANGER'};if(c>=.30)return{t:'Congestionado',cls:'ORANGE'};if(c>=.10)return{t:'Moderado',cls:'WARN'};if(v>=15)return{t:'Moderado',cls:'WARN'};return{t:'Fluido',cls:'OK'}}
function velDiff(p){let a=Number(p.currentSpeed),l=Number(p.freeFlowSpeed);return Number.isFinite(a)&&Number.isFinite(l)?Math.max(0,l-a):0}
function estadoClima(p){let lluvia=Number(p.om_lluvia_mm??0),viento=Number(p.om_viento_kmh??0),desc=p.descripcion_clima||'Sin dato';if(lluvia>=2||viento>=45)return{t:'Clima adverso',cls:'DANGER'};if(lluvia>0||viento>=30)return{t:'Precaución climática',cls:'WARN'};return{t:desc,cls:'INFO'}}
function recomendacion(p){let r=p.NIVEL_RIESGO,tr=estadoTrafico(p).t,cl=estadoClima(p).t;if(r==='ALTO')return{t:'Manejar con máxima precaución',cls:'DANGER'};if(r==='MEDIO'||tr!=='Fluido'||cl.includes('Precaución'))return{t:'Precaución moderada',cls:'WARN'};return{t:'Condiciones normales',cls:'OK'}}
function estilo(f){let r=f.properties.NIVEL_RIESGO||'SIN_DATO';return{color:color[r]||color.SIN_DATO,weight:r==='ALTO'?7:r==='MEDIO'?5:4,opacity:.9,lineCap:'round',lineJoin:'round'}}
function dibujar(z){if(layer)map.removeLayer(layer);layer=L.geoJSON(features,{style:estilo,onEachFeature:(f,l)=>{l.on('click',()=>detalle(f));l.on('mouseover',()=>l.setStyle({weight:estilo(f).weight+2,opacity:1}));l.on('mouseout',()=>l.setStyle(estilo(f)));l.bindPopup(popup(f))}}).addTo(map);if(z&&layer.getBounds().isValid())map.fitBounds(layer.getBounds(),{padding:[30,30]})}
function popup(f){let p=f.properties,r=p.NIVEL_RIESGO,tr=estadoTrafico(p);return `<b>${p.COD_CARRETERA}</b><br><span class="risk ${r}">${r}</span><br><span class="tag ${tr.cls}">${tr.t}</span><br><br>Score final: ${Number(p.SCORE_MAPA||0).toFixed(3)}<br>Temperatura: ${val(p.om_temperatura_c)} °C<br>Clima: ${p.descripcion_clima??'-'}`}
function detalle(f){let p=f.properties,r=p.NIVEL_RIESGO,ref=p.TIEMPO_REAL_MATCH==='exacto'?'Coincidencia por código':p.TIEMPO_REAL_MATCH==='cercano'?`Punto cercano ${p.distancia_punto_km??'-'} km`:'Sin dato en tiempo real',tr=estadoTrafico(p),cl=estadoClima(p),rec=recomendacion(p);el('det').innerHTML=`<span class="risk ${r}">${r}</span><div class="quick"><div class="section-title" style="margin-top:0">Resumen rápido</div><div class="quick-grid"><div class="quick-item"><span>Riesgo</span><b>${r}</b></div><div class="quick-item"><span>Tráfico</span><b><span class="tag ${tr.cls}">${tr.t}</span></b></div><div class="quick-item"><span>Clima</span><b><span class="tag ${cl.cls}">${cl.t}</span></b></div><div class="quick-item"><span>Recomendación</span><b><span class="tag ${rec.cls}">${rec.t}</span></b></div></div></div><div class="section-title">Datos generales</div><div class="detail"><span>Código</span><b>${p.COD_CARRETERA}</b></div><div class="detail"><span>Departamento</span><b>${p.DEPARTAMENTO||'-'}</b></div><div class="detail"><span>Referencia actual</span><b>${ref}</b></div><div class="detail"><span>Score base modelo</span><b>${Number(p.SCORE_BASE_MODELO||0).toFixed(4)}</b></div><div class="detail"><span>Score final mapa</span><b>${Number(p.SCORE_MAPA||0).toFixed(4)}</b></div><div class="section-title">Tráfico actual</div><div class="detail"><span>Estado del tráfico</span><b><span class="tag ${tr.cls}">${tr.t}</span></b></div><div class="detail"><span>Diferencia de velocidad</span><b>${val(velDiff(p))} km/h</b></div><div class="detail"><span>Velocidad actual</span><b>${p.currentSpeed??'-'} km/h</b></div><div class="detail"><span>Velocidad libre</span><b>${p.freeFlowSpeed??'-'} km/h</b></div><div class="detail"><span>Congestión técnica</span><b>${pct(p.factor_congestion_html)}</b></div><div class="detail"><span>Cierre reportado por TomTom</span><b>${p.roadClosure?'Sí':'No'}</b></div><div class="section-title">Clima actual</div><div class="detail"><span>Estado del clima</span><b><span class="tag ${cl.cls}">${cl.t}</span></b></div><div class="detail"><span>Descripción</span><b>${p.descripcion_clima??'-'}</b></div><div class="detail"><span>Temperatura</span><b>${val(p.om_temperatura_c)} °C</b></div><div class="detail"><span>Sensación térmica</span><b>${val(p.ow_sensacion_termica_c)} °C</b></div><div class="detail"><span>Humedad</span><b>${val(p.om_humedad_pct)}%</b></div><div class="detail"><span>Lluvia</span><b>${val(p.om_lluvia_mm)} mm</b></div><div class="detail"><span>Nubosidad</span><b>${val(p.om_nubosidad_pct)}%</b></div><div class="detail"><span>Viento</span><b>${val(p.om_viento_kmh)} km/h</b></div><div class="detail"><span>Actualizado</span><b>${p.actualizado_en?new Date(p.actualizado_en).toLocaleTimeString('es-PE'):'-'}</b></div>`}
function filtrar(){if(!layer)return;let r=el('fr').value,d=el('fd').value,q=txt(el('q').value),min=Number(el('fs').value);el('sv').textContent=min.toFixed(2);let t=0,m=0,a=0;layer.eachLayer(l=>{let p=l.feature.properties,contenido=txt([p.COD_CARRETERA,p.DEPARTAMENTO,p.NOMBRE,p.RUTA].join(' '));let ok=(r==='TODOS'||p.NIVEL_RIESGO===r)&&(d==='TODOS'||p.DEPARTAMENTO===d)&&(!q||contenido.includes(q))&&Number(p.SCORE_MAPA||0)>=min;if(ok){l.setStyle({...estilo(l.feature),opacity:.92});t++;if(p.NIVEL_RIESGO==='MEDIO')m++;if(p.NIVEL_RIESGO==='ALTO')a++}else l.setStyle({...estilo(l.feature),opacity:.08,weight:2})});el('tot').textContent=t;el('med').textContent=m;el('alt').textContent=a}
function llenarDptos(){let s=new Set();features.forEach(f=>{if(f.properties.DEPARTAMENTO)s.add(f.properties.DEPARTAMENTO)});el('fd').innerHTML='<option>TODOS</option>';[...s].sort().forEach(d=>{let o=document.createElement('option');o.textContent=d;el('fd').appendChild(o)})}
function limpiar(){el('fr').value='TODOS';el('fd').value='TODOS';el('q').value='';el('fs').value=0;filtrar()}function zoomFiltrado(){let g=L.featureGroup();layer.eachLayer(l=>{if(l.options.opacity>.2)g.addLayer(l)});if(g.getBounds().isValid())map.fitBounds(g.getBounds(),{padding:[40,40]})}
function setStatus(x){el('status').textContent=x}function error(x){el('err').style.display='block';el('err').textContent=x}function fmt(x){return Number.isFinite(Number(x))?Number(x).toFixed(4):'-'}function pct(x){return Number.isFinite(Number(x))?(Number(x)*100).toFixed(1)+'%':'-'}function val(x){return Number.isFinite(Number(x))?Number(x).toFixed(2):'-'}
init();
</script>
</body>
</html>
